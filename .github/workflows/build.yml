name: Build XPI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build XPI
        run: ./build.sh

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-doi-manager-xpi
          path: "*.xpi"
